<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formatos - Secretaría de Movilidad</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
    font-family: Georgia, "Times New Roman", serif;
}

header{
    background:white;
    padding:30px 10px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    margin-bottom:40px;
}

header h1{
    color:#7d1b1b;
    font-weight:bold;
}

.titulo{
    color:#7d1b1b;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    min-height:70px;
    margin-bottom:20px;
}

.card{
    border:none;
    box-shadow:0 5px 20px rgba(0,0,0,.18);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

iframe{
    width:100%;
    height:500px;
    border:none;
}

.btn-descarga{
    width:100%;
    margin-top:15px;
}

footer{
    margin-top:50px;
    padding:20px;
    text-align:center;
    color:#666;
}

</style>

</head>
<body>

<header>

<h1>SECRETARÍA DE MOVILIDAD LA CEJA</h1>

<p>Descarga de Formatos</p>

</header>

<div class="container">

<div class="row g-4">

<!-- FORMULARIO RUNT -->

<div class="col-lg-3 col-md-6">

<div class="titulo">
FORMULARIO<br>RUNT
</div>

<div class="card">

<iframe src="pdf/Formulario_RUNT.pdf"></iframe>

<div class="card-body">

<a href="pdf/Formulario_RUNT.pdf"
class="btn btn-danger btn-descarga"
download>

Descargar PDF

</a>

</div>

</div>

</div>

<!-- DECLARACION -->

<div class="col-lg-3 col-md-6">

<div class="titulo">
DECLARACIÓN<br>JURAMENTADA
</div>

<div class="card">

<iframe src="pdf/Declaracion_Juramentada.pdf"></iframe>

<div class="card-body">

<a href="pdf/Declaracion_Juramentada.pdf"
class="btn btn-danger btn-descarga"
download>

Descargar PDF

</a>

</div>

</div>

</div>

<!-- CONTRATO -->

<div class="col-lg-3 col-md-6">

<div class="titulo">
CONTRATO DE<br>MANDATO
</div>

<div class="card">

<iframe src="pdf/Contrato_Mandato.pdf"></iframe>

<div class="card-body">

<a href="pdf/Contrato_Mandato.pdf"
class="btn btn-danger btn-descarga"
download>

Descargar PDF

</a>

</div>

</div>

</div>

<!-- CAMBIO DOCUMENTO -->

<div class="col-lg-3 col-md-6">

<div class="titulo">
SOLICITUD CAMBIO<br>DE DOCUMENTO
</div>

<div class="card">

<iframe src="pdf/Cambio_Documento.pdf"></iframe>

<div class="card-body">

<a href="pdf/Cambio_Documento.pdf"
class="btn btn-danger btn-descarga"
download>

Descargar PDF

</a>

</div>

</div>

</div>

</div>

</div>

<footer>

© Secretaría de Movilidad La Ceja

</footer>

</body>
</html>
