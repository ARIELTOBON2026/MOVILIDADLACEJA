<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta charset="UTF-8">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background:#f4f6f9;
    }

    .card{
      margin-top:40px;
      border-radius:15px;
    }

    h2{
      color:#0d6efd;
      font-weight:bold;
    }

    th{
      width:150px;
      background:#f8f9fa;
    }

    #mensaje{
      font-weight:bold;
      margin-top:15px;
    }
  </style>

</head>

<body>

<div class="container">

  <div class="row justify-content-center">

    <div class="col-md-6">

      <div class="card shadow">

        <div class="card-body">

          <h2 class="text-center">
            SECRETARÍA DE MOVILIDAD
          </h2>

          <h4 class="text-center mb-4">
            Consulta de Vehículos
          </h4>

          <div class="input-group mb-3">

            <input
              type="text"
              id="placa"
              class="form-control"
              placeholder="Digite la placa"
              onkeyup="if(event.key==='Enter') consultar();">

            <button
              class="btn btn-primary"
              onclick="consultar()">
              Consultar
            </button>

          </div>

          <table class="table table-bordered">

            <tr>
              <th>PLACA</th>
              <td id="rPlaca"></td>
            </tr>

            <tr>
              <th>ESTADO</th>
              <td id="rEstado"></td>
            </tr>

          </table>

          <div id="mensaje" class="text-center text-danger"></div>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

function limpiar(){

  document.getElementById("rPlaca").innerHTML="";
  document.getElementById("rEstado").innerHTML="";
  document.getElementById("mensaje").innerHTML="";

}

function consultar(){

  limpiar();

  let placa=document.getElementById("placa").value.trim().toUpperCase();

  if(placa==""){

    document.getElementById("mensaje").innerHTML="Digite una placa.";
    return;

  }

  google.script.run

    .withSuccessHandler(function(r){

      if(r==null){

        document.getElementById("mensaje").innerHTML="Vehículo no encontrado.";
        return;

      }

      document.getElementById("rPlaca").innerHTML=r.placa;
      document.getElementById("rEstado").innerHTML=r.estado;

    })

    .withFailureHandler(function(error){

      document.getElementById("mensaje").innerHTML="Error: "+error.message;

    })

    .buscarPlaca(placa);

}

</script>

</body>
</html>
