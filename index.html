<input type="text" id="placa" placeholder="Ingrese la placa">
<button onclick="consultar()">Consultar</button>

<pre id="resultado"></pre>

<script>
const URL = "https://script.google.com/macros/s/AKfycbx4spIQssVnd5p3j5B5DGiB4EV86eIlfVLSX6xo5yq8MjdH0nhCWNoSRfA9uX-nvRta/exec";

function consultar() {
    const placa = document.getElementById("placa").value.trim().toUpperCase();

    fetch(URL + "?placa=" + encodeURIComponent(placa))
        .then(r => r.json())
        .then(data => {
            document.getElementById("resultado").textContent =
                JSON.stringify(data, null, 2);
        })
        .catch(err => {
            document.getElementById("resultado").textContent =
                "Error: " + err;
        });
}
</script>
