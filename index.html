<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Consulta Vehículos</title>

</head>

<body>

<h2>Consulta</h2>

<input id="placa" placeholder="ABC123">

<button onclick="buscar()">
Consultar
</button>

<div id="resultado"></div>

<script>

const URL="https://script.google.com/macros/s/AKfycbwG_rZ9f7S_YLTQRs9QScJi1d7lQerWYH4TFTGKUUYaVSSWFzG6wPi2tNBqd2B3wWUR/exec";

async function buscar(){

let placa=document.getElementById("placa").value;

let respuesta=await fetch(URL+"?placa="+placa);

let datos=await respuesta.json();

if(datos.encontrado){

document.getElementById("resultado").innerHTML=`
<h3>${datos.placa}</h3>
Estado: ${datos.estado}
`;

}else{

document.getElementById("resultado").innerHTML="No encontrada";

}

}

</script>

</body>
</html>
