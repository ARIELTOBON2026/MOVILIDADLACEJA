<header class="text-center text-white py-5">

<h1>

<i class="bi bi-search"></i>

CONSULTA DE VEHÍCULOS

</h1>

<p>

Secretaría de Movilidad La Ceja

</p>

</header>

<!--=====================================
CONSULTA
======================================-->

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-5">

<div class="text-center mb-4">

<i class="bi bi-car-front-fill display-1 text-primary"></i>

<h2 class="mt-3">

Consultar por Radicado

</h2>

<p class="text-muted">

Ingrese la placa del vehículo

</p>

</div>

<div class="input-group input-group-lg">

<input

type="text"

id="placa"

class="form-control"

maxlength="10"

placeholder="Ejemplo: ABC123"

style="text-transform:uppercase;">

<button

class="btn btn-primary"

onclick="consultarRadicado()">

<i class="bi bi-search"></i>

Consultar

</button>

</div>

<div class="mt-3 d-grid gap-2">

<button

class="btn btn-outline-secondary"

onclick="limpiarConsulta()">

<i class="bi bi-arrow-clockwise"></i>

Nueva Consulta

</button>

</div>

<div class="text-center mt-4">

<div

id="loader"

class="spinner-border text-primary"

style="display:none;"

role="status">

</div>

</div>

<div

id="resultado"

class="mt-4"

style="display:none;">

</div>

</div>

</div>

</div>

</div>

</div>

<!--=====================================
INFORMACIÓN
======================================-->

<section class="container mt-5">

<div class="row">

<div class="col-md-4">

<div class="card text-center h-100 shadow">

<div class="card-body">

<i class="bi bi-clock-history display-4 text-primary"></i>

<h5 class="mt-3">


<!--=====================================
PIE
======================================-->

<footer class="mt-5">

<div class="container text-center">

<h5>

SECRETARÍA DE MOVILIDAD LA CEJA

</h5>

<p>

Sistema de Consulta Vehicular

</p>

<p>

<span id="fecha"></span>

</p>

<a

href="index.html"

class="btn btn-light">

<i class="bi bi-house-door-fill"></i>

Volver al Inicio

</a>

</div>

</footer>

<button

id="btnTop"

class="btn btn-primary rounded-circle"

onclick="volverArriba()"

style="display:none;position:fixed;right:20px;bottom:20px;">

<i class="bi bi-arrow-up"></i>

</button>
